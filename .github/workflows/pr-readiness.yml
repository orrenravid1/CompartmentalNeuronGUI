name: pr-readiness

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  verify-pr-readiness:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest mkdocs mkdocs-material "mkdocstrings[python]"

      - name: Verify sealed PR tip
        run: python scripts/pr_readiness.py verify --rerun-commands
